# CI: build the native libraries + CLI tools + tests on Linux and macOS,
# and run the full ctest suite. The repo is published as a
# FetchContent-only library, so a broken native build is the worst-case
# downstream outcome — this matrix is what catches it.

name: native

# Run on every push and pull request (no path filters — a green build
# is a repo-wide invariant, and path-filtered runs silently skipped
# changes that did affect the build) plus on every published release.
on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset default

      # --config / --build-config matter only on multi-config generators
      # (Visual Studio on Windows); they are no-ops on the single-config
      # Makefile generators used on Linux/macOS, where CMAKE_BUILD_TYPE
      # from the preset (RelWithDebInfo) already fixes the configuration.
      # Without a matching --build-config, ctest on Windows reports
      # "Test not available without configuration" and runs nothing.
      - name: Build
        run: cmake --build --preset default --config RelWithDebInfo

      - name: Test
        run: ctest --preset default --output-on-failure --build-config RelWithDebInfo
