# CI: build CADML to WebAssembly and run the end-to-end node test.
#
# Mirrors the local recipe in src/wasm/README.md (emsdk 5.0.7 + ninja), on a
# Linux runner where emcc/emcmake land on PATH automatically.

name: wasm

# Run on every push and pull request (no path filters) plus on every
# published release.
on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The software version has one source of truth: project(VERSION …)
      # in CMakeLists.txt (README, the web footer, and the vendored
      # artifact stamps all derive from it). A release tag that disagrees
      # is a mislabelled release — fail the build instead of shipping it.
      - name: Verify release tag matches project version
        if: github.event_name == 'release'
        run: |
          ver=$(sed -nE 's/^[[:space:]]*VERSION[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt | head -1)
          if [ "v$ver" != "$GITHUB_REF_NAME" ]; then
            echo "::error::release tag $GITHUB_REF_NAME != project version v$ver (CMakeLists.txt)"
            exit 1
          fi

      - name: Set up Node (to run the wasm module)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '5.0.7'

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure (FetchContent pulls all deps)
        run: cmake --preset wasm

      - name: Build cadml.wasm
        run: cmake --build build/wasm

      - name: Report artifact size
        run: ls -l build/wasm/cadml.js build/wasm/cadml.wasm

      # Publish the built module so it can be vendored into web/public/wasm
      # without a local emscripten toolchain (download with `gh run download`).
      - name: Upload wasm artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cadml-wasm
          path: |
            build/wasm/cadml.js
            build/wasm/cadml.wasm
          if-no-files-found: error

      - name: End-to-end test
        working-directory: src/wasm
        run: node test_cadml_wasm.cjs
